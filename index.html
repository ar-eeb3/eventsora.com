<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENTSORA - Launching Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F8F7F4;
            /* Warm Alabaster */
            background-image:
                radial-gradient(at 0% 0%, rgba(212, 175, 55, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.03) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #1A1A1A;
        }

        /* Soft Decorative Elements */
        .circle-decoration {
            position: absolute;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite ease-in-out;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2.5rem;
            width: 100%;
            max-width: 850px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 500;
            /* Ultra-light for elegance */
            letter-spacing: 0.3em;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: rgb(172, 0, 86);
            
            animation: fadeInDown 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .status {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: #B8860B;
            /* Muted Gold */
            margin-bottom: 60px;
            animation: fadeIn 2s ease-out;
        }

        /* Light Mode Premium Timer */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            animation: fadeInUp 1.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .time-block {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px 10px;
            border-radius: 24px;
            box-shadow:
                0 10px 25px -5px rgba(0, 0, 0, 0.04),
                0 8px 10px -6px rgba(0, 0, 0, 0.02);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .time-block:hover {
            transform: translateY(-10px);
            background: #FFFFFF;
            box-shadow: 0 20px 40px -10px rgba(184, 134, 11, 0.15);
            border-color: rgba(184, 134, 11, 0.2);
        }

        .time-value {
            display: block;
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 300;
            color: #1A1A1A;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .time-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #999;
            font-weight: 700;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.5;
            }
        }

        @media (max-width: 600px) {
            .countdown-container {
                gap: 10px;
            }

            .time-block {
                padding: 25px 5px;
                border-radius: 16px;
            }

            h1 {
                letter-spacing: 0.15em;
                color: rgb(233, 51, 81);
            }
        }
    </style>
</head>

<body>
    <div class="circle-decoration" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="circle-decoration" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div class="container">
        <h1>EVENTSORA</h1>
        <p class="status">The Future of Events</p>

        <div class="countdown-container">
            <div class="time-block">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-block">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date('April 30, 2026 00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
