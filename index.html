<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVENTSORA — Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent:      #861043; /* Deep Rose */
      --accent-light:#a8245c;
      --bg-base:     #F4F1ED; /* Warm Stone / Champagne */
      --text-main:   #1A1216; /* Deep Ink */
      --text-muted:  #635A5E;
      --card-bg:     rgba(255, 255, 255, 0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background-color: var(--bg-base);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Atmospheric depth ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.5;
    }
    .blob-1 {
      width: 500px; height: 500px;
      top: -100px; right: -100px;
      background: radial-gradient(circle, rgba(134,16,67,0.12) 0%, transparent 70%);
    }
    .blob-2 {
      width: 400px; height: 400px;
      bottom: -50px; left: -50px;
      background: radial-gradient(circle, rgba(168,36,92,0.08) 0%, transparent 70%);
    }

    /* ── Frame ── */
    .border-frame {
      position: fixed;
      inset: 30px;
      border: 1px solid rgba(134,16,67,0.15);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
      width: 100%;
    }

    /* ── Typography ── */
    .eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; /* Increased weight */
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 0.15em;
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.05));
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(1.2rem, 2.5vw, 1.6rem);
      color: var(--text-muted);
      margin-bottom: 50px;
      letter-spacing: 0.02em;
    }

    /* ── Countdown ── */
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 50px;
    }

    .time-block {
      background: var(--card-bg);
      border: 1px solid rgba(134,16,67,0.1);
      backdrop-filter: blur(15px);
      padding: 30px 10px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      transition: all 0.4s ease;
    }

    .time-block:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 15px 35px rgba(134,16,67,0.1);
    }

    .time-value {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; /* Increased weight */
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      color: var(--text-main);
      line-height: 1;
    }

    .time-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 8px;
      display: block;
    }

    /* ── Instagram Button ── */
    .insta-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(134,16,67,0.2);
    }

    .insta-link:hover {
      background: var(--accent-light);
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(134,16,67,0.3);
    }

    .insta-icon { width: 20px; height: 20px; }

    @media (max-width: 600px) {
      .border-frame { inset: 15px; }
      .countdown { gap: 10px; }
      .time-block { padding: 20px 5px; }
      .logo { letter-spacing: 0.1em; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="border-frame"></div>

  <div class="container">
    <p class="eyebrow">Launching April 2026</p>
    <h1 class="logo">EVENTSORA</h1>
    <p class="tagline">The art of unforgettable celebration.</p>

    <div class="countdown">
      <div class="time-block">
        <span class="time-value" id="days">00</span>
        <span class="time-label">Days</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="hours">00</span>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="minutes">00</span>
        <span class="time-label">Mins</span>
      </div>
      <div class="time-block">
        <span class="time-value" id="seconds">00</span>
        <span class="time-label">Secs</span>
      </div>
    </div>

    <div class="social-section">
      <a class="insta-link" href="https://instagram.com/areeb.startup" target="_blank">
        <svg class="insta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.2"/>
          <circle cx="17.5" cy="6.5" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
        <span>FOLLOW THE JOURNEY</span>
      </a>
    </div>
  </div>

  <script>
    const target = new Date('April 30, 2026 00:00:00').getTime();
    const els = {
      days:    document.getElementById('days'),
      hours:   document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    function update() {
      const now = new Date().getTime();
      const dist = target - now;
      
      if (dist < 0) return;

      els.days.innerText    = Math.floor(dist / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
      els.hours.innerText   = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
      els.minutes.innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      els.seconds.innerText = Math.floor((dist % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }

    setInterval(update, 1000);
    update();
  </script>
</body>
</html>
