<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVENTSORA — Launching Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold:        #861043;
      --gold-light:  #a8245c;
      --gold-dim:    rgba(134,16,67,0.18);
      --cream:       #fce5f0;
      --ink:         #0e0408;
      --muted:       rgba(252,229,240,0.45);
      --rose:        #861043;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--ink);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── Grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Atmospheric blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 600px; height: 600px;
      top: -180px; left: -160px;
      background: radial-gradient(circle, rgba(134,16,67,0.22) 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite;
    }
    .blob-2 {
      width: 500px; height: 500px;
      bottom: -140px; right: -120px;
      background: radial-gradient(circle, rgba(252,229,240,0.07) 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite;
    }
    .blob-3 {
      width: 350px; height: 350px;
      top: 40%; left: 55%;
      background: radial-gradient(circle, rgba(134,16,67,0.10) 0%, transparent 70%);
      animation: drift3 15s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(40px, 60px) scale(1.08); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-50px,-40px) scale(1.1); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(-30px, 50px); }
    }

    /* ── Decorative lines ── */
    .h-line {
      position: fixed;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.18), transparent);
      pointer-events: none;
      z-index: 1;
    }
    .h-line-top    { top: 48px; }
    .h-line-bottom { bottom: 48px; }

    .v-line {
      position: fixed;
      height: 100%;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(201,168,76,0.12), transparent);
      pointer-events: none;
      z-index: 1;
    }
    .v-line-left  { left: 48px; }
    .v-line-right { right: 48px; }

    /* ── Corner marks ── */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      z-index: 2;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
      opacity: 0.5;
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }
    .corner-tl { top: 48px; left: 48px; }
    .corner-tr { top: 48px; right: 48px; transform: scaleX(-1); }
    .corner-bl { bottom: 48px; left: 48px; transform: scaleY(-1); }
    .corner-br { bottom: 48px; right: 48px; transform: scale(-1); }

    /* ── Main container ── */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
      width: 100%;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(.22,1,.36,1) 0.2s forwards;
    }

    /* ── Logo ── */
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.8rem, 10vw, 7.5rem);
      letter-spacing: 0.22em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--cream);
      margin-bottom: 6px;
      opacity: 0;
      animation: riseIn 1.1s cubic-bezier(.22,1,.36,1) 0.4s forwards;
      position: relative;
    }

    /* Gold shimmer sweep on logo */
    .logo::after {
      content: 'EVENTSORA';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(252,229,240,0.45) 50%, transparent 70%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s ease-in-out 2s infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: var(--muted);
      margin-bottom: 64px;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(.22,1,.36,1) 0.65s forwards;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 52px;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(.22,1,.36,1) 0.8s forwards;
    }
    .divider-line {
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim) 80%);
    }
    .divider-line:last-child {
      background: linear-gradient(90deg, var(--gold-dim) 20%, transparent);
    }
    .divider-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* ── Countdown ── */
    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 60px;
      opacity: 0;
      animation: riseIn 1.2s cubic-bezier(.22,1,.36,1) 1s forwards;
    }

    .time-block {
      position: relative;
      padding: 36px 8px 28px;
      border: 1px solid rgba(134,16,67,0.25);
      border-radius: 4px;
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(10px);
      transition: border-color 0.4s, background 0.4s, transform 0.4s cubic-bezier(.175,.885,.32,1.275);
      overflow: hidden;
    }

    .time-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .time-block:hover::before { opacity: 1; }

    .time-block:hover {
      border-color: rgba(134,16,67,0.5);
      background: rgba(134,16,67,0.08);
      transform: translateY(-6px);
    }

    /* Flip animation wrapper */
    .flip-container {
      perspective: 400px;
      margin-bottom: 10px;
    }
    .time-value {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      color: var(--cream);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
    }
    .time-block:hover .time-value { color: var(--gold-light); }

    .time-label {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      opacity: 0.7;
    }

    /* Tick flash */
    .tick-flash {
      animation: tickFlash 0.15s ease;
    }
    @keyframes tickFlash {
      0%   { opacity: 0.4; transform: scaleY(0.92); }
      100% { opacity: 1;   transform: scaleY(1); }
    }

    /* ── Email form ── */
    .notify-section {
      opacity: 0;
      animation: riseIn 1s cubic-bezier(.22,1,.36,1) 1.3s forwards;
    }
    .notify-label {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .notify-form {
      display: flex;
      gap: 0;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 3px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .notify-form:focus-within {
      border-color: rgba(201,168,76,0.55);
    }
    .notify-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: none;
      outline: none;
      padding: 14px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--cream);
      letter-spacing: 0.05em;
    }
    .notify-input::placeholder { color: rgba(245,239,224,0.25); }
    .notify-btn {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 14px 22px;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .notify-btn:hover { background: var(--gold-light); }
    .notify-btn.sent  {
      background: rgba(201,168,76,0.2);
      color: var(--gold);
      pointer-events: none;
    }

    /* ── Animations ── */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .h-line, .v-line, .corner { display: none; }
      .countdown { gap: 10px; }
      .time-block { padding: 24px 6px 20px; border-radius: 3px; }
      .tagline { margin-bottom: 40px; }
    }

    @media (max-width: 380px) {
      .time-label { letter-spacing: 0.15em; }
    }

    /* ── Instagram ── */
    .insta-section {
      margin-top: 36px;
      opacity: 0;
      animation: riseIn 1s cubic-bezier(.22,1,.36,1) 1.6s forwards;
    }
    .insta-label {
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .insta-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--cream);
      border: 1px solid rgba(134,16,67,0.35);
      border-radius: 50px;
      padding: 10px 22px 10px 16px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      transition: all 0.35s cubic-bezier(.22,1,.36,1);
      background: rgba(134,16,67,0.08);
    }
    .insta-link:hover {
      background: rgba(134,16,67,0.22);
      border-color: var(--gold);
      color: var(--cream);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(134,16,67,0.25);
    }
    .insta-icon {
      width: 18px;
      height: 18px;
      color: var(--gold);
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .insta-link:hover .insta-icon {
      transform: scale(1.15);
    }
  </style>
</head>
<body>

  <!-- Atmosphere -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Frame lines -->
  <div class="h-line h-line-top"></div>
  <div class="h-line h-line-bottom"></div>
  <div class="v-line v-line-left"></div>
  <div class="v-line v-line-right"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">

    <p class="eyebrow">Est. 2026 &nbsp;·&nbsp; The Future of Events</p>

    <h1 class="logo">EVENTSORA</h1>

    <p class="tagline">Where every moment is crafted to be remembered.</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-diamond" style="opacity:0.35;transform:rotate(45deg) scale(0.6);"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="countdown">
      <div class="time-block">
        <div class="flip-container"><span class="time-value" id="days">00</span></div>
        <span class="time-label">Days</span>
      </div>
      <div class="time-block">
        <div class="flip-container"><span class="time-value" id="hours">00</span></div>
        <span class="time-label">Hours</span>
      </div>
      <div class="time-block">
        <div class="flip-container"><span class="time-value" id="minutes">00</span></div>
        <span class="time-label">Minutes</span>
      </div>
      <div class="time-block">
        <div class="flip-container"><span class="time-value" id="seconds">00</span></div>
        <span class="time-label">Seconds</span>
      </div>
    </div>


    <div class="insta-section">
      <p class="insta-label">Watch the journey unfold</p>
      <a class="insta-link" href="https://instagram.com/ar-eeb1" target="_blank" rel="noopener">
        <svg class="insta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.2"/>
          <circle cx="17.5" cy="6.5" r="0.9" fill="currentColor" stroke="none"/>
        </svg>
        <span>@ar-eeb1</span>
      </a>
    </div>

  </div>

  <script>
    /* ── Countdown ── */
    const target = new Date('April 30, 2026 00:00:00').getTime();
    const els = {
      days:    document.getElementById('days'),
      hours:   document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };
    let prev = {};

    function tick(el, val) {
      const padded = val.toString().padStart(2, '0');
      if (el.innerText !== padded) {
        el.innerText = padded;
        el.classList.remove('tick-flash');
        void el.offsetWidth; // reflow
        el.classList.add('tick-flash');
      }
    }

    function updateCountdown() {
      const dist = target - Date.now();
      if (dist <= 0) {
        Object.values(els).forEach(e => e.innerText = '00');
        return;
      }
      tick(els.days,    Math.floor(dist / 864e5));
      tick(els.hours,   Math.floor((dist % 864e5) / 36e5));
      tick(els.minutes, Math.floor((dist % 36e5) / 6e4));
      tick(els.seconds, Math.floor((dist % 6e4) / 1e3));
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* ── Notify button ── */
    const btn   = document.getElementById('notifyBtn');
    const input = document.getElementById('emailInput');

    btn.addEventListener('click', () => {
      if (!input.value || !input.value.includes('@')) {
        input.style.borderLeft = '2px solid rgba(172,0,86,0.7)';
        setTimeout(() => input.style.borderLeft = '', 900);
        return;
      }
      btn.textContent = '✓ Subscribed';
      btn.classList.add('sent');
      input.disabled = true;
    });
  </script>
</body>
</html>
